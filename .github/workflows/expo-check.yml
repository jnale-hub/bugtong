name: Expo Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: expo-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install and Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Verify web export
        run: npx expo export -p web
